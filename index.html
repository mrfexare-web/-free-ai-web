<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Mode Web App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        button { padding: 10px 20px; background-color: #007BFF; color: white; border: none; cursor: pointer; }
        #output { margin-top: 20px; padding: 10px; background: #f4f4f4; border-radius: 5px; min-height: 50px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>My Free AI Mode Interface</h2>
    <textarea id="userInput" placeholder="Ask the AI anything..."></textarea>
    <br>
    <button onclick="queryAI()">Submit to AI</button>
    <h3>Response:</h3>
    <div id="output">AI response will appear here...</div>

    <script>
        async function queryAI() {
            const input = document.getElementById('userInput').value;
            const outputDiv = document.getElementById('output');
            outputDiv.innerText = "Thinking...";

            try {
                // Connecting to a free open-source model tier hosted via Hugging Face
                const response = await fetch("https://huggingface.co", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ inputs: input })
                });

                const data = await response.json();
                
                if (Array.isArray(data) && data[0] && data[0].generated_text) {
                    outputDiv.innerText = data[0].generated_text;
                } else if (data && data.generated_text) {
                    outputDiv.innerText = data.generated_text;
                } else {
                    outputDiv.innerText = "Error parsing response or model is loading. Try again in a moment.";
                }
            } catch (error) {
                outputDiv.innerText = "Error: " + error.message;
            }
        }
    </script>
</body>
</html>
